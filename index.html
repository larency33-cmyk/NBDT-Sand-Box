
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBDT</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Anton&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Fluid Spacing */
            --space-xs: clamp(0.5rem, 1vw, 0.75rem);
            --space-sm: clamp(0.75rem, 1.5vw, 1rem);
            --space-md: clamp(1rem, 2vw, 1.5rem);
            --space-lg: clamp(1.5rem, 3vw, 2.5rem);
            --space-xl: clamp(2.5rem, 5vw, 4rem);

            /* Fluid Typography */
            --text-xs: clamp(0.7rem, 0.1vw + 0.7rem, 0.8rem);
            --text-sm: clamp(0.8rem, 0.2vw + 0.8rem, 0.9rem);
            --text-base: clamp(0.9rem, 0.3vw + 0.9rem, 1.05rem);
            --text-lg: clamp(1.1rem, 0.5vw + 1.1rem, 1.3rem);
            --text-xl: clamp(1.1rem, 0.3vw + 1.1rem, 1.25rem);
            --text-2xl: clamp(1.4rem, 0.6vw + 1.4rem, 1.7rem);
            --text-3xl: clamp(1.8rem, 1vw + 1.8rem, 2.2rem);
            --text-4xl: clamp(2.4rem, 1.5vw + 2.4rem, 3rem);

            /* Theme Variables - Default Dark */
            --bg-main: #020617;
            --bg-sidebar: #020617;
            --bg-card: rgba(15, 23, 42, 0.4);
            --bg-input: rgba(15, 23, 42, 0.4);
            --text-main: #f3f4f6;
            --text-dim: #94a3b8;
            --text-muted: #64748b;
            --border-main: rgba(30, 41, 59, 0.4);
            --border-subtle: rgba(255, 255, 255, 0.05);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --shadow-color: rgba(0, 0, 0, 0.5);
            
            --neon-indigo: #6366f1;
            --neon-emerald: #10b981;
        }

        .display-type {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            line-height: 0.82;
            letter-spacing: -0.02em;
        }

        .hardware-card {
            background: #0a0f1d;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .hardware-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-indigo), transparent);
            opacity: 0.3;
        }

        .dashed-border {
            border: 1px dashed rgba(148, 163, 184, 0.2);
        }

        .atmosphere {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .grid-pattern {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        .skew-title {
            transform: skewX(-10deg);
        }

        .micro-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 800;
            color: var(--text-muted);
        }

        .light {
            --bg-main: #f8fafc;
            --bg-sidebar: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-input: #ffffff;
            --text-main: #0f172a;
            --text-dim: #475569;
            --text-muted: #94a3b8;
            --border-main: rgba(203, 213, 225, 0.8);
            --border-subtle: rgba(0, 0, 0, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --shadow-color: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-size: var(--text-base);
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        h1 { font-size: var(--text-3xl); font-weight: 900; letter-spacing: -0.05em; }
        h2 { font-size: var(--text-2xl); font-weight: 800; letter-spacing: -0.03em; }
        h3 { font-size: var(--text-xl); font-weight: 700; letter-spacing: -0.02em; }

        .fluid-container {
            width: 100%;
            padding-left: var(--space-md);
            padding-right: var(--space-md);
            padding-top: var(--space-md);
            padding-bottom: var(--space-md);
        }

        .adaptive-grid-systems {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: var(--space-md);
        }

        .adaptive-grid-issues {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: var(--space-md);
        }

        .readable-content {
            max-width: 80ch;
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-dark {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.2);
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.4);
        }

        @keyframes pulse-bg {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.6; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.1); }
        }

        @keyframes pulse-line {
            0% { transform: scaleX(0); opacity: 0; transform-origin: left; }
            50% { transform: scaleX(1); opacity: 1; transform-origin: left; }
            51% { transform: scaleX(1); opacity: 1; transform-origin: right; }
            100% { transform: scaleX(0); opacity: 0; transform-origin: right; }
        }

        .pulse-bg {
            animation: pulse-bg 8s ease-in-out infinite;
        }

        .breathe {
            animation: breathe 3s ease-in-out infinite;
        }

        .pulse-line {
            animation: pulse-line 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .glass-v2 {
            background: rgba(10, 15, 29, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.02);
        }

        .neon-text-red {
            color: #ff4444;
            text-shadow: 0 0 8px rgba(255, 68, 68, 0.4);
        }

        .neon-border-red {
            border-color: rgba(255, 68, 68, 0.4);
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.1);
        }

        .tilt-card {
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .tilt-card:hover {
            transform: translateY(-4px) scale(1.01) perspective(1000px) rotateX(1deg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(99, 102, 241, 0.1);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>

    <style>
      /* NBDT SAFE UI POLISH STEP 1 - CSS ONLY, no React logic changes */
      :root {
        --nbdt-bg-0: #020617;
        --nbdt-bg-1: #071022;
        --nbdt-glass: rgba(15, 23, 42, 0.62);
        --nbdt-border: rgba(148, 163, 184, 0.16);
        --nbdt-text: #e5edf8;
        --nbdt-muted: #94a3b8;
        --nbdt-indigo: #6366f1;
        --nbdt-cyan: #22d3ee;
        --nbdt-emerald: #34d399;
      }

      html {
        scroll-behavior: smooth;
        background: var(--nbdt-bg-0);
      }

      body {
        background:
          radial-gradient(circle at 16% 10%, rgba(99, 102, 241, 0.14), transparent 30%),
          radial-gradient(circle at 88% 18%, rgba(34, 211, 238, 0.08), transparent 28%),
          radial-gradient(circle at 70% 105%, rgba(16, 185, 129, 0.06), transparent 26%),
          linear-gradient(135deg, #020617 0%, #071022 48%, #020617 100%) !important;
        color: var(--nbdt-text);
      }

      /* Keep keyboard accessibility visible without changing app logic */
      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      [role="button"]:focus-visible {
        outline: 2px solid rgba(129, 140, 248, 0.95) !important;
        outline-offset: 3px !important;
        box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.15) !important;
      }

      /* Better scrollbar visibility for wide roadmap work */
      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      *::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.42);
      }

      *::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, rgba(99, 102, 241, 0.72), rgba(34, 211, 238, 0.46));
        border-radius: 999px;
        border: 2px solid rgba(2, 6, 23, 0.88);
      }

      *::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, rgba(129, 140, 248, 0.92), rgba(45, 212, 191, 0.72));
      }

      /* Softer premium hover on interactive buttons only */
      button {
        transition: transform 160ms ease, border-color 160ms ease, background-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0) scale(0.99);
      }

      /* Improve truncated text readability without changing layout */
      .truncate {
        letter-spacing: -0.01em;
      }

      /* Gentle glass highlight on cards/panels using common Tailwind class patterns */
      [class*="border-slate-800"],
      [class*="border-slate-900"] {
        border-color: rgba(148, 163, 184, 0.14) !important;
      }

      [class*="bg-slate-900/"],
      [class*="bg-[#0a0f1d]"] {
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.035), 0 12px 34px rgba(2,6,23,0.18);
      }

      /* Make tiny muted labels slightly more legible on dark UI */
      [class*="text-slate-600"] {
        color: #64748b !important;
      }

      [class*="text-slate-500"] {
        color: #7f8ea3 !important;
      }

      /* Respect users who prefer reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>

  </head>
<body>
    <div class="atmosphere"></div>
    <div class="grid-pattern"></div>
    <div class="noise-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
